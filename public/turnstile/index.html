<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Symponia Verification</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="widget"></div>

  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <script>
    var params  = new URLSearchParams(window.location.search);
    var theme   = params.get('theme') === 'light' ? 'light' : 'dark';
    var widgetId;

    function post(data) {
      var msg = JSON.stringify(data);
      if (window.ReactNativeWebView) {
        window.ReactNativeWebView.postMessage(msg);
      }
      // no-op in a regular browser — safe to open directly for testing
    }

    function render() {
      widgetId = turnstile.render('#widget', {
        sitekey: '0x4AAAAAADkqlMmMldfP5eVw',
        theme:   theme,
        callback: function (token) {
          post({ type: 'token', token: token });
        },
        'expired-callback': function () {
          post({ type: 'expired' });
          turnstile.reset(widgetId);
        },
        'error-callback': function () {
          post({ type: 'error' });
          setTimeout(function () { turnstile.reset(widgetId); }, 1500);
        },
      });
    }

    function waitForTurnstile() {
      if (window.turnstile) { render(); }
      else { setTimeout(waitForTurnstile, 50); }
    }

    waitForTurnstile();
  </script>
</body>
</html>
